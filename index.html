<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirim Foto ke Telegram</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 20px; }
        #status { margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <h2>Ambil Foto & Kirim ke Telegram Bot</h2>
    
    <!-- Input untuk buka galeri -->
    <input type="file" accept="image/*" id="pilih-foto">
    
    <div id="status"></div>

    <script>
        // === GANTI BAGIAN INI ===
        const TELEGRAM_TOKEN = '8762651077:AAHAbyLHR3DRVNEWxSXbO7kDi2PS-vV9A1A';
        const CHAT_ID = '1966317946';
        // ========================

        document.getElementById('pilih-foto').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const statusDiv = document.getElementById('status');
            statusDiv.innerText = "Sedang mengirim ke Telegram...";
            statusDiv.style.color = "orange";

            // Siapkan data untuk dikirim
            const formData = new FormData();
            formData.append('chat_id', CHAT_ID);
            formData.append('photo', file);
            formData.append('caption', 'Foto baru dikirim dari website GitHub Pages!');

            // Kirim data ke API Telegram
            fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendPhoto`, {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if (data.ok) {
                    statusDiv.innerText = "Foto berhasil dikirim ke Bot Telegram!";
                    statusDiv.style.color = "green";
                } else {
                    statusDiv.innerText = "Gagal mengirim: " + data.description;
                    statusDiv.style.color = "red";
                }
            })
            .catch(error => {
                statusDiv.innerText = "Terjadi kesalahan koneksi.";
                statusDiv.style.color = "red";
                console.error(error);
            });
        });
    </script>

</body>
</html>
